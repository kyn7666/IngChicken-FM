# Flow Matching CL + FM-SDFT (no ER) — LIBERO-Long

seed: 42
device: "cuda"
weights_dir: ""

benchmark:
  name: "libero_10"
  task_order_index: 0
  data_root: "/workspace/data"

data:
  obs_horizon: 2
  action_horizon: 16
  action_dim: 7
  batch_size: 64
  num_workers: 4
  normalize_action: true
  use_eye_in_hand: true
  image_size: [128, 128]
  obs_keys:
    - "agentview_image"
    - "ee_pos"
    - "ee_ori"
    - "gripper_states"

vision_encoder:
  type: "resnet18"
  pretrained: true
  feature_dim: 512
  spatial_softmax: true
  num_kp: 32

flow_matching:
  num_flow_steps: 10

unet:
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

continual_learning:
  epochs_per_task: 50

training:
  learning_rate: 1.0e-4
  finetune_learning_rate: 1.0e-4
  steps_per_epoch: 110
  weight_decay: 1.0e-6
  lr_warmup_steps: 500
  ema_decay: 0.995
  gradient_clip: 1.0
  mixed_precision: true

evaluation:
  num_episodes: 20
  max_steps_per_episode: 600
  action_execution_horizon: 8
  num_flow_steps: 10
  save_video: false

replay:
  enabled: false
  buffer_size: 1000
  mix_ratio: 0.5

sdft:
  enabled: true
  weight: 0.3
  num_flow_steps: 10
  num_episodes: 5
  max_steps_per_episode: 1000
  max_states: 200
  batch_size: 16

logging:
  project: "flow_policy_cl_libero_long_sdft_noer"
  log_interval: 50
  exp_name: ""
  checkpoint_dir: "checkpoints/cl_long_sdft_noer"
  results_dir: "results/cl_long_sdft_noer"
  use_tensorboard: true

wandb:
  enabled: true
  entity: "ingchicken"
  project: "sdft"
  group: "long"
  name: "sdft - long"
  tags:
    - "long"
    - "sdft-fm"
    - "no-er"
    - "lambda0.3"
  resume: "allow"
