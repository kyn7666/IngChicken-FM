# Flow Matching CL + FM-SDFT + CLIP — LIBERO-Long

seed: 42
device: "cuda"
weights_dir: "checkpoints/pretrain_fm_clip_1000ep/best_ema.pt"

benchmark:
  name: "libero_10"
  task_order_index: 0
  data_root: "/scratch2/kyn7666/libero_data"

data:
  obs_horizon: 2
  action_horizon: 16
  action_dim: 7
  batch_size: 64
  num_workers: 4
  normalize_action: true
  use_eye_in_hand: true
  image_size: [128, 128]
  obs_keys:
    - "agentview_image"
    - "ee_pos"
    - "ee_ori"
    - "gripper_states"
  clip_emb_path: "data/clip_embeddings/libero_10.pt"

model:
  task_emb_dim: 128

vision_encoder:
  type: "resnet18"
  pretrained: true
  feature_dim: 512
  spatial_softmax: true
  num_kp: 32

flow_matching:
  num_flow_steps: 10

unet:
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

continual_learning:
  epochs_per_task: 50

training:
  learning_rate: 1.0e-4
  finetune_learning_rate: 1.0e-4
  steps_per_epoch: 220
  weight_decay: 1.0e-6
  lr_warmup_steps: 500
  ema_decay: 0.995
  gradient_clip: 1.0
  mixed_precision: true

evaluation:
  num_episodes: 20
  max_steps_per_episode: 500
  action_execution_horizon: 8
  num_flow_steps: 10
  save_video: false

replay:
  enabled: true
  buffer_size: 1000
  mix_ratio: 0.5

sdft:
  enabled: true
  weight: 0.1
  num_flow_steps: 10
  num_episodes: 5
  max_steps_per_episode: 500
  max_states: 200
  batch_size: 16

logging:
  project: "flow_policy_cl_libero_long_sdft"
  log_interval: 50
  exp_name: ""
  checkpoint_dir: "checkpoints/cl_long_sdft_clip_l0.1_s220"
  results_dir: "results_step/cl_long_sdft_clip_l0.1_s220"
  use_tensorboard: true

wandb:
  enabled: true
  entity: "ingchicken"
  project: "clip-sdft"
  group: "long"
  name: "clip_lambda0.1_s220_seed0"
  tags:
    - "long"
    - "sdft-fm"
    - "clip"
  resume: "allow"
